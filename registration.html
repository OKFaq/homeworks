<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./Styles/styles.css">
    <title>Registration</title>
</head>
<body>
    <div class="reg-container">
        <img src="/Pictures/X.png" alt="" class="reg-img-x">

        <div class="reg-container2">

            <div class="reg-heads">
                <h2 class="reg-heads-login">Login</h2>
                <h2 class="reg-heads-slash">|</h2>
                <h2 class="reg-heads-register">Register</h2>
            </div>

            <p class="reg-p-help">Enter your email and password to register.</p>

            <form action="">

                <div class="reg-inputs">
                    <input type="text" name="" id="" placeholder="Username" class="reg-input1">
                    <input type="text" name="" id="" placeholder="Enter your email address" class="reg-input1">
                    <input type="password" name="" id="" placeholder="Password" class="reg-input1">
                    <img src="Pictures/Hide.png" alt="">
                    <input type="password" name="" id="" placeholder="Confirm Password" class="reg-input1">
                </div>
            
                <input type="submit" value="Register" class="reg-input-submit">

            </form>   

            <div class="reg-desc">
                <div class="reg-border"></div>
                <p class="reg">Or register with</p>
                <div class="reg-border"></div>
            </div>

            <div class="registers">
                <a class="registers-a" href=""><img src="Pictures/google 1.svg" class="pictures">Continue with Google</a>
                <a class="registers-a" href=""><img src="Pictures/facebook 1.png" class="pictures">Continue with Google</a>
            </div>

        </div>
          <div class="reg-footer"></div> 
    </div>
</body>
</html>
